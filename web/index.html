<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Docmind - AI Document Assistant">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Docmind">

  <!-- Theme color -->
  <meta name="theme-color" content="#0F0F10">

  <title>Docmind — AI Document Assistant</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0F0F10;
      margin: 0;
      padding: 0;
    }
    /* Loading screen */
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      color: #9898A5;
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      background: #0F0F10;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid #2E2E38;
      border-top: 3px solid #7C6AF7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading screen shown before Flutter loads -->
  <div id="loading">
    <div class="loader"></div>
    <span>Loading Docmind...</span>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
