name: docmind_flutter
description: "Docmind - AI Document Assistant"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.10.8 <4.0.0'
  flutter: ">=3.38.9"

dependencies:
  flutter:
    sdk: flutter

  # ─── Supabase (Auth + DB + Storage) ───────────────────
  supabase_flutter: ^2.12.4         # Official Supabase SDK

  # ─── State Management ──────────────────────────────────
  flutter_bloc: ^8.1.6             # BLoC pattern
  hydrated_bloc: ^9.1.5            # Auto-saves BLoC state to disk
  bloc: ^8.1.4                     # Core BLoC library
  equatable: ^2.0.5                # Value equality for BLoC states

  # ─── Local Storage ─────────────────────────────────────
  hive_flutter: ^1.1.0             # Fast local DB (chat cache)
  path_provider: ^2.1.4            # File system paths

  # ─── Navigation ────────────────────────────────────────
  go_router: ^14.6.2               # Production-grade routing

  # ─── HTTP & Networking ─────────────────────────────────
  dio: ^5.7.0                      # HTTP client with interceptors
  http: ^1.2.2                     # For SSE streaming

  # ─── File Handling ─────────────────────────────────────
  file_picker: ^8.1.7              # Pick PDF/images/text files
  flutter_pdfview: ^1.4.4          # Render PDFs in app

  # ─── UI & Design ───────────────────────────────────────
  flutter_animate: ^4.5.2          # Smooth animations
  flutter_markdown: ^0.7.4        # keep for now
  highlight: ^0.7.0               # syntax highlighting
  flutter_highlight: ^0.7.0  
  shimmer: ^3.0.0                  # Loading skeleton effect
  cached_network_image: ^3.4.1     # Cache images efficiently
  lottie: ^3.1.3                   # Lottie animations (loading etc)

  # ─── Icons ─────────────────────────────────────────────
  iconsax_flutter: ^1.0.1          # Modern icon set

  # ─── Utils ─────────────────────────────────────────────
  intl: ^0.19.0                    # Date formatting
  uuid: ^4.5.1                     # Generate unique IDs
  shared_preferences: ^2.3.3       # Simple key-value storage
  connectivity_plus: ^6.1.1        # Check internet connection
  url_launcher: ^6.3.1             # Open URLs
  flutter_dotenv: ^5.2.1           # .env file support
  web: ^1.1.1
  top_snackbar_flutter: ^3.1.0
  open_filex: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#0F0F10"
    theme_color: "#7C6AF7"